<div class="inputRow">
  @if (label) {
    <label [for]="label" [class.visually-hidden]="!displayLabel" class="form-label"
      >{{ label }}
      @if (isRequired) {
        <span class="required-asterisk" aria-hidden="true"><span class="text-danger">*</span></span>
      }
    </label>
  }

  <div class="inputWrapper" [class.hasError]="error">
    <input
      [id]="label"
      class="form-control"
      [type]="type"
      [placeholder]="placeholder"
      [value]="model ?? ''"
      (input)="onInput($event)"
      (blur)="blur.emit()"
      aria-invalid="{{ !!error }}"
      [attr.aria-describedby]="error ? label + 'Error' : null"
      [attr.maxlength]="maxlength"
      [attr.min]="minDate"
      [attr.aria-required]="isRequired"
    />

    @if (icon) {
      <img class="inputIcon" [src]="icon" width="24" height="24" aria-hidden="true" />
    }
  </div>

  @if (reserveErrorSpace || error) {
    <div
      class="text-danger small ps-2 errorMessage"
      [class.no-space]="!reserveErrorSpace"
      [id]="label + 'Error'"
      role="alert"
    >
      @if (error) {
        {{ error }}
      }
    </div>
  }
</div>
