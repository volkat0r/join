<section class="taskboard container py-4">

  <div class="taskboard-inner">

    <!-- Desktop: Spalten-Header in einer Reihe -->
    <div class="row taskboard-columns-header d-none d-lg-flex mb-3">
      <div class="col-12 col-lg-3">
        <header class="kanban-header d-flex align-items-center justify-content-between">
          <h2 class="h5 my-0">To Do</h2>
          <button
            class="board-list-add-button p-0 d-flex align-items-center justify-content-center border border-black border-2 rounded-3">
            <img src="assets/icons/add-plus-dark24px.svg" alt="">
          </button>
        </header>
      </div>

      <div class="col-12 col-lg-3">
        <header class="kanban-header d-flex align-items-center justify-content-between">
          <h2 class="h5 my-0">In Progress</h2>
          <button
            class="board-list-add-button p-0 d-flex align-items-center justify-content-center border border-black border-2 rounded-3">
            <img src="assets/icons/add-plus-dark24px.svg" alt="">
          </button>
        </header>
      </div>

      <div class="col-12 col-lg-3">
        <header class="kanban-header d-flex align-items-center justify-content-between">
          <h2 class="h5 my-0">Review</h2>
          <button
            class="board-list-add-button p-0 d-flex align-items-center justify-content-center border border-black border-2 rounded-3">
            <img src="assets/icons/add-plus-dark24px.svg" alt="">
          </button>
        </header>
      </div>

      <div class="col-12 col-lg-3">
        <header class="kanban-header">
          <h2 class="h5 my-0">Done</h2>
        </header>
      </div>
    </div>

    <div class="taskboard-scroll row">

      <!-- To Do -->
      <section class="col-12 col-lg-3 taskboard-column">
        <header class="kanban-header d-flex d-lg-none align-items-center justify-content-between mb-3">
          <h2 class="h5 m-0">To Do</h2>
          <button
            class="board-list-add-button p-0 d-flex align-items-center justify-content-center border border-black border-2 rounded-3">
            <img src="assets/icons/add-plus-dark24px.svg" alt="">
          </button>
        </header>
        <div class="kanban-column d-flex flex-column gap-3">
          @for (task of todoTasks(); track task.id) {
          <app-task-card [task]="task" (openTask)="openTaskDetail($event)"></app-task-card>
          }
        </div>
      </section>

      <!-- In Progress -->
      <section class="col-12 col-lg-3 taskboard-column">
        <header class="kanban-header d-flex d-lg-none align-items-center justify-content-between mb-3">
          <h2 class="h5 m-0">In Progress</h2>
          <button
            class="board-list-add-button p-0 d-flex align-items-center justify-content-center border border-black border-2 rounded-3">
            <img src="assets/icons/add-plus-dark24px.svg" alt="">
          </button>

        </header>
        <div class="kanban-column d-flex flex-column gap-3">
          @for (task of inProgressTasks(); track task.id) {
          <app-task-card [task]="task" (openTask)="openTaskDetail($event)"></app-task-card>
          }
        </div>
      </section>

      <!-- Review -->
      <section class="col-12 col-lg-3 taskboard-column">
        <header class="kanban-header d-flex d-lg-none align-items-center justify-content-between mb-3">
          <h2 class="h5 m-0">Review</h2>
          <button
            class="board-list-add-button p-0 d-flex align-items-center justify-content-center border border-black border-2 rounded-3">
            <img src="assets/icons/add-plus-dark24px.svg" alt="">
          </button>
        </header>
        <div class="kanban-column d-flex flex-column gap-3">
          @for (task of reviewTasks(); track task.id) {
          <app-task-card [task]="task" (openTask)="openTaskDetail($event)"></app-task-card>
          }
        </div>
      </section>

      <!-- Done -->
      <section class="col-12 col-lg-3 taskboard-column">
        <header class="kanban-header d-flex d-lg-none align-items-center justify-content-between mb-3">
          <h2 class="h5 m-0">Done</h2>
        </header>
        <div class="kanban-column d-flex flex-column gap-3">
          @for (task of doneTasks(); track task.id) {
          <app-task-card [task]="task" (openTask)="openTaskDetail($event)"></app-task-card>
          }
        </div>
      </section>

    </div>

  </div>
</section>
