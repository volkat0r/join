<section class="taskboard">
  <div class="taskboard-inner d-flex flex-column flex-lg-row gap-lg-3">

    <!-- To Do Column -->
    <section class="flex-lg-1 d-flex flex-column min-h-0">
      <header class="d-flex align-items-center justify-content-between mb-3 flex-shrink-0">
        <h2 class="h5 m-0">To Do</h2>
        <button class="board-list-add-button p-0 d-flex align-items-center justify-content-center border border-black border-2 rounded-3">
          <img src="assets/icons/add-plus-dark24px.svg" alt="Add task">
        </button>
      </header>
      <div class="taskboard-scroll d-flex flex-row flex-lg-column overflow-x-auto overflow-lg-x-hidden overflow-lg-y-auto" horizontalScroll>
        @for (task of todoTasks(); track task.id) {
          <app-task-card class="task-item" [task]="task" (openTask)="openTaskDetail($event)"></app-task-card>
        }
      </div>
    </section>

    <!-- In Progress Column -->
    <section class="flex-lg-1 d-flex flex-column min-h-0">
      <header class="d-flex align-items-center justify-content-between mb-3 flex-shrink-0">
        <h2 class="h5 m-0">In Progress</h2>
        <button class="board-list-add-button p-0 d-flex align-items-center justify-content-center border border-black border-2 rounded-3">
          <img src="assets/icons/add-plus-dark24px.svg" alt="Add task">
        </button>
      </header>
      <div class="taskboard-scroll d-flex flex-row flex-lg-column overflow-x-auto overflow-lg-x-hidden overflow-lg-y-auto" horizontalScroll>
        @for (task of inProgressTasks(); track task.id) {
          <app-task-card class="task-item" [task]="task" (openTask)="openTaskDetail($event)"></app-task-card>
        }
      </div>
    </section>

    <!-- Await Feedback Column -->
    <section class="flex-lg-1 d-flex flex-column min-h-0">
      <header class="d-flex align-items-center justify-content-between mb-3 flex-shrink-0">
        <h2 class="h5 m-0">Await Feedback</h2>
        <button class="board-list-add-button p-0 d-flex align-items-center justify-content-center border border-black border-2 rounded-3">
          <img src="assets/icons/add-plus-dark24px.svg" alt="Add task">
        </button>
      </header>
      <div class="taskboard-scroll d-flex flex-row flex-lg-column overflow-x-auto overflow-lg-x-hidden overflow-lg-y-auto" horizontalScroll>
        @for (task of reviewTasks(); track task.id) {
          <app-task-card class="task-item" [task]="task" (openTask)="openTaskDetail($event)"></app-task-card>
        }
      </div>
    </section>

    <!-- Done Column -->
    <section class="flex-lg-1 d-flex flex-column min-h-0">
      <header class="d-flex align-items-center justify-content-between mb-3 flex-shrink-0">
        <h2 class="h5 m-0">Done</h2>
      </header>
      <div class="taskboard-scroll d-flex flex-row flex-lg-column overflow-x-auto overflow-lg-x-hidden overflow-lg-y-auto" horizontalScroll>
        @for (task of doneTasks(); track task.id) {
          <app-task-card class="task-item" [task]="task" (openTask)="openTaskDetail($event)"></app-task-card>
        }
      </div>
    </section>

  </div>
</section>

@if (showAddTaskForm()) {
  <app-task-add-form [useModal]="true" (closed)="closeAddTask()" (created)="onTaskCreated()" />
}
