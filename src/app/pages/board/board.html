<main class="board">
  <header class="board__header">
    <div class="header-headline d-flex align-items-center justify-content-between">
      <h2 class="mb-0">Board</h2>
      <button
        class="board-list-add-button p-0 d-flex align-items-center justify-content-center border border-black border-2 rounded-3 d-lg-none"
        (click)="openAdd()">
        <img src="assets/icons/add-white-24px.svg" alt="">
      </button>
    </div>

    <nav class="d-flex align-items-center" aria-label="Board actions">
      <app-input-field class="w-100 w-lg-auto" type="text" label="Search tasks" placeholder="Find task"
        icon="assets/icons/search-32px.svg" />
      <ui-button class="d-none d-lg-inline-block text-nowrap" type="button" variant="primary" icon="add"
        (click)="openAdd()">Add
        task</ui-button>
    </nav>
  </header>

  <section class="task-board">
    <app-task-board (open)="openDetail($event)"></app-task-board>
  </section>

  @if (isModalOpen() && modalMode === 'add') {
    <app-task-add-form [useModal]="true" (closed)="closeModal()" (created)="closeModal()" />
  }
</main>
