<div class="task-card mb-2">
  <span class="category" [ngClass]="getCategoryClass()" *ngIf="task.category">{{ task.category }}</span>

  <div class="task-header d-flex justify-content-between align-items-center">
    <h5>{{ task.title }}</h5>
  </div>

  <p *ngIf="task.description">{{ task.description }}</p>


  <div class="info-row" *ngIf="task.subtasks.length || task.contacts.length">
    <!-- top row: progress info -->
    <div class="progress-container" *ngIf="task.subtasks.length">
      <div class="progress-bar">
        <div class="progress" [style.width.%]="subtaskPercent"></div>
      </div>
      <small>{{ completedSubtasks }}</small>
    </div>

    <div class="bottom-row">
      <div class="avatars" *ngIf="task.contacts.length">
        <span *ngFor="let c of task.contacts" class="avatar" [style.background]="c.color">
          {{ initials(c.name) }}
        </span>
      </div>
      <div class="priority-icon" [ngClass]="'priority-' + task.priority.toLowerCase()">
        <img *ngIf="task.priority.toLowerCase() === 'urgent'" src="assets/icons/prio-urgent-red-20px.svg"
          alt="Urgent Priority" />
        <img *ngIf="task.priority.toLowerCase() === 'medium'" src="assets/icons/prio-medium-20px.svg"
          alt="Medium Priority" />
        <img *ngIf="task.priority.toLowerCase() === 'low'" src="assets/icons/prio-low-20px.svg" alt="Low Priority" />
      </div>
    </div>
  </div>
</div>
