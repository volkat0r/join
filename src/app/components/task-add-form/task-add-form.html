<app-user-feedback #feedback animation="slide-up" icon="/assets/icons/nav-board-white-30px.svg" />

@if (useModal()) {
  <ui-modal-wrapper (close)="onCancel()">
    <h3 class="mb-3">Add Task</h3>
    <ng-container *ngTemplateOutlet="formTemplate" />
  </ui-modal-wrapper>
} @else {
  <ng-container *ngTemplateOutlet="formTemplate" />
}

<ng-template #formTemplate>
  <form (ngSubmit)="submit()">
    <div class="row">
      <div [class]="editTask() ? 'col-12' : 'col-12 col-lg-5'">
        <div class="my-2">
          <app-input-field
            type="text"
            label="Title"
            id="Title"
            placeholder="Enter title"
            [maxlength]="30"
            [(model)]="form.title"
            [error]="errors['title']"
            (blur)="markDirty('title')"
            (inputChange)="liveValidate('title')"
            [isRequired]="true"
            [reserveErrorSpace]="true"
          />
        </div>

        <ui-textarea
          id="Description"
          label="Description"
          placeholder="Description"
          [rows]="5"
          [maxlength]="200"
          [(model)]="form.description"
        ></ui-textarea>

        <app-input-field
          type="date"
          label="Due Date"
          id="Due-Date"
          placeholder="Enter due date"
          [(model)]="form.due_date"
          [error]="errors['due_date']"
          (blur)="markDirty('due_date')"
          (inputChange)="liveValidate('due_date')"
          [isRequired]="true"
          [reserveErrorSpace]="true"
        />
      </div>

      @if (!editTask()) {
        <div class="col-lg-1 d-none d-lg-flex justify-content-center">
          <div class="vr"></div>
        </div>
      }

      <div [class]="editTask() ? 'col-12' : 'col-12 col-lg-6'">
        <div class="my-3">
          <label class="form-label d-block">Priority</label>
          <div class="d-flex justify-content-center justify-content-lg-start gap-2 priority-picker">
            <ui-button
              type="button"
              variant="urgent"
              icon="urgent"
              [active]="form.priority === 'urgent'"
              (click)="onPrioritySelected('urgent')"
              >Urgent</ui-button
            >
            <ui-button
              type="button"
              variant="medium"
              icon="medium"
              [active]="form.priority === 'medium'"
              (click)="onPrioritySelected('medium')"
              >Medium</ui-button
            >
            <ui-button
              type="button"
              variant="low"
              icon="low"
              [active]="form.priority === 'low'"
              (click)="onPrioritySelected('low')"
              >Low</ui-button
            >
          </div>
        </div>

        <div class="mb-3">
          <app-contact-picker
            [contacts]="contactsDb.contacts()"
            [initialSelectedIds]="selectedContactIds"
            (selectedIdsChange)="onContactsSelected($event)"
          />
        </div>

        <div class="mb-lg-2">
          <label for="Category" class="form-label">
            Category <span class="text-danger">*</span>
          </label>
          <div class="category-picker" (click)="openCategoryDropdown()">
            <app-input-field
              type="text"
              id="Category"
              placeholder="Select task category"
              [model]="form.category"
              [error]="errors['category']"
              [isRequired]="true"
              [reserveErrorSpace]="true"
            />

            @if (isCategoryOpen()) {
              <ul class="category-picker__dropdown">
                @for (option of categoryOptions; track option.value) {
                  <li
                    class="category-picker__item"
                    (click)="selectCategory(option.value)"
                    [class.active]="form.category === option.value"
                  >
                    {{ option.label }}
                  </li>
                }
              </ul>
            }
          </div>
        </div>

        <div class="mb-3">
          <app-subtask-input-group
            [subtasks]="form.subtasks"
            (subtasksChange)="form.subtasks = $event"
          />
        </div>
      </div>
    </div>

    <div class="row mt-4">
      <div
        class="col-12 d-flex justify-content-end justify-content-lg-start align-items-center gap-3"
      >
        <span class="me-auto d-none d-sm-inline-block"
          ><span class="text-danger">*</span>This field is required</span
        >

        @if (!editTask()) {
          <ui-button type="button" variant="secondary" (click)="onCancel()">Clear </ui-button>
        }
        <ui-button
          type="submit"
          variant="primary"
          [disabled]="isSaving"
          [icon]="editTask() ? 'create' : 'add'"
        >
          {{ editTask() ? 'Ok' : 'Create Task' }}
        </ui-button>
      </div>
    </div>
  </form>
</ng-template>
