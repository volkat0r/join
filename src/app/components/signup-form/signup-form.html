<div class="container d-flex flex-column justify-content-center justify-content-lg-between gap-4 align-items-center mx-auto">
  <section class="header d-flex w-100 justify-content-center justify-content-lg-between">
    <img class="logo" src="./assets/icons/logo-join-dark-100px.svg" alt="">
  </section>
  <div class="card px-3 py-4 px-md-4 p-lg-5 position-relative">
    <app-back-button class="position-absolute"></app-back-button>
    <h3 class="my-2 my-lg-4 text-center">Sign Up</h3>
    <div class="blue-divider"></div>

    <form (ngSubmit)="submit()" class="d-flex flex-column pt-4">
      <app-input-field type="text" label="Name" placeholder="Name"
        icon="assets/icons/form-person-24px.svg" [(model)]="form.name" [error]="errors.name" (blur)="markDirty('name')"
        (input)="liveValidate('name')" [maxlength]="30" [displayLabel]="false" [reserveErrorSpace]="true" />

      <app-input-field type="email" label="Email" placeholder="Email"
        icon="assets/icons/form-mail-24px.svg" [(model)]="form.email" [error]="errors.email" (blur)="markDirty('email')"
        (input)="liveValidate('email')" [maxlength]="35" [displayLabel]="false" [reserveErrorSpace]="true" />

      <app-input-field type="password" label="Password" placeholder="Password"
        icon="assets/icons/form-lock-24px.svg" [(model)]="form.password" [error]="errors.password"
        (blur)="markDirty('password')" (input)="liveValidate('password')" [displayLabel]="false"
        [reserveErrorSpace]="true" />

      <app-input-field type="password" label="Confirm Password" placeholder="Confirm Password"
        icon="assets/icons/form-lock-24px.svg" [(model)]="form.confirmPassword" [error]="errors.confirmPassword"
        (blur)="markDirty('confirmPassword')" (input)="liveValidate('confirmPassword')" [displayLabel]="false"
        [reserveErrorSpace]="true" />

      <div class="mb-3 d-flex justify-content-center align-items-center gap-2 privacy-checkbox" (click)="form.acceptedPrivacy = !form.acceptedPrivacy">
        <img
          [src]="form.acceptedPrivacy ? 'assets/icons/checkbox-checked-default-24px.svg' : 'assets/icons/checkbox-default-24px.svg'"
          [alt]="form.acceptedPrivacy ? 'Accepted' : 'Not accepted'"
          class="checkbox-icon"
        >
        <label class="mb-0 user-select-none" for="acceptPrivacy">
          I accept the <a routerLink="/privacy-policy" target="_blank" class="text-primary" (click)="$event.stopPropagation()">Privacy Policy</a>
        </label>
      </div>

      <div
        class="d-flex flex-column flex-lg-row gap-2 gap-lg-4 mt-lg-2 align-items-center justify-content-center justify-content-lg-center w-100">
        <ui-button type="submit" variant="primary" [disabled]="!isFormValid() || isSubmitting()">
          Sign Up
        </ui-button>

      </div>
      <div class="text-danger fw-bold mt-2">
        @if (errorMessage()) {
        {{ errorMessage() }}
        }
      </div>
    </form>
  </div>
  <footer class="d-flex gap-4 align-items-center">
    <a routerLink="/privacy-policy">Privacy Policy</a>
    <a routerLink="/legal-notice">Legal Notice</a>
  </footer>
</div>
