<div class="container d-flex flex-column justify-content-between align-items-center mx-auto">
  <section class="header d-flex w-100 justify-content-center justify-content-lg-between">
    <img class="logo" src="./assets/icons/logo-join-dark-100px.svg" alt="">
    <div>
      <div class="d-none d-lg-flex align-items-center gap-2">
        <span class="me-2">Not a Join user?</span>
        <ui-button type="button" variant="primary" routerLink="/signup">
          Sign Up
        </ui-button>
      </div>
    </div>
  </section>
  <div class="card px-3 py-4 px-md-4 p-lg-5">
    <h3 class="my-2 my-sm-4 text-center">Log in</h3>
    <div class="blue-divider"></div>

    <form (ngSubmit)="submit()" class="d-flex flex-column pt-4">
      <app-input-field type="email" label="Email" placeholder="Email" icon="assets/icons/form-mail-24px.svg"
        [(model)]="form.email" [error]="errors.email" (blur)="markDirty('email')" (input)="liveValidate('email')"
        [maxlength]="35" [displayLabel]="false" [reserveErrorSpace]="true" />

      <app-input-field type="password" label="Password" placeholder="Password" icon="assets/icons/form-lock-24px.svg"
        [(model)]="form.password" [error]="errors.password" (blur)="markDirty('password')"
        (input)="liveValidate('password')" [displayLabel]="false" [reserveErrorSpace]="true" />

      <div class="d-flex flex-column flex-lg-row gap-2 gap-lg-4 mt-lg-2 align-items-center justify-content-center justify-content-lg-center w-100">
        <ui-button type="submit" variant="primary" [disabled]="!isFormValid()" (click)="submit()">
          Log in
        </ui-button>

        <ui-button type="button" variant="secondary" (click)="guestLogin()">
          Guest Log in
        </ui-button>
      </div>
      <div class="text-danger fw-bold mt-2">
        @if (errorMessage()) {
        {{ errorMessage() }}
        }
      </div>
    </form>
  </div>
  <div class="d-flex d-lg-none align-items-center gap-2">
    <span class="me-2">Not a Join user?</span>
    <ui-button type="button" variant="primary" routerLink="/signup">
      Sign Up
    </ui-button>
  </div>
  <footer class="d-flex gap-4 align-items-center">
    <a routerLink="/privacy-policy">Privacy Policy</a>
    <a routerLink="/legal-notice">Legal Notice</a>
  </footer>
</div>
