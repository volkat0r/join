<ui-modal-wrapper (close)="onCancel()" id="contact-add-form">
  <div class="modal-inner d-flex flex-column h-100 w-100">
    <div class="row g-0 flex-grow-1 h-100">
      <div class="col-12 col-lg-5 d-flex flex-column justify-content-center align-items-start modal-title-area p-3 p-sm-4 py-5 p-lg-5 pt-5 gap-0">
        <img
          src="/assets/icons/logo-join-default-100px.svg"
          alt="Join Logo"
          class="logo d-none d-lg-block"
        />
        <h2 class="mt-4 mb-1 mb-lg-3">Add contact</h2>
        <p class="slogan mb-2">Tasks are better with a team!</p>
        <div class="blue-divider mb-2"></div>
      </div>

      <div class="col-12 col-lg-7 d-flex flex-row align-items-center justify-content-lg-evenly gap-lg-4 p-3 p-sm-4 p-lg-4 position-relative">
        <div class="d-flex flex-column align-items-center px-lg-2 px-xl-4">
          <div class="d-flex align-items-center justify-content-center contact-avatar">
            <img src="/assets/icons/person-white-64px.svg" alt="Initialism placeholder" />
          </div>
        </div>
        <form (ngSubmit)="submit()" class="mt-lg-0 d-flex flex-column gap-0 px-lg-2 gap-lg-2 modal-content-area w-100 w-lg-75">
          <app-input-field type="text" label="Name" placeholder="Name" icon="assets/icons/form-person-24px.svg"
            [(model)]="form.name" [error]="errors.name" (blur)="markDirty('name')" (input)="liveValidate('name')"
            [maxlength]="30" />



          <app-input-field
            type="email"
            label="Email"
            placeholder="Email"
            icon="assets/icons/form-mail-24px.svg"
            [(model)]="form.email"
            [error]="errors.email"
            (blur)="markDirty('email')"
            (input)="liveValidate('email')"
            [maxlength]="35"
          />

          <app-input-field
            type="tel"
            label="Phone"
            placeholder="Phone"
            icon="assets/icons/form-phone-24px.svg"
            [(model)]="form.phone"
            [error]="errors.phone"
            (blur)="markDirty('phone')"
            (input)="liveValidate('phone')"
            [maxlength]="15"
          />

          <div class="d-flex gap-4 mt-2 justify-content-center justify-content-lg-start">
            <ui-button
              type="button"
              variant="secondary"
              icon="cancel"
              class="d-none d-lg-inline-flex"
              [disabled]="isSaving"
              (click)="onCancel()"
            >
              Cancel
            </ui-button>

            <ui-button
              type="submit"
              variant="primary"
              icon="create"
              [disabled]="isSaving || !isFormValid()"
            >
              Create contact
            </ui-button>
          </div>
          <div class="text-danger fw-bold mt-2">
            @if (errorMessage) {
              {{ errorMessage }}
            }
          </div>
        </form>
      </div>
    </div>
  </div>
</ui-modal-wrapper>
